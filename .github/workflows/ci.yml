name: CI (파서 테스트)

on:
  push:
    branches: [main]
    # 봇의 seen.json 커밋 등 테스트와 무관한 변경에는 돌지 않는다
    paths:
      - "**.py"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**.py"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/ci.yml"

# 테스트만 도는 job — 쓰기 권한 불필요
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # khu-notice.yml과 동일한 원칙: 액션은 커밋 SHA로 고정
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install --require-hashes -r requirements.txt -r requirements-dev.txt

      - name: 파서 테스트 (네트워크 불필요 — fixtures/ mock HTML)
        run: python -m pytest tests/ -v
