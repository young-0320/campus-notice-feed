name: KHU EE 공지 감시

on:
  schedule:
    # 3일마다 00:00 UTC = 09:00 KST
    - cron: "0 0 */3 * *"
  workflow_dispatch:   # 수동 실행 버튼

# 스케줄 실행과 수동 실행이 겹쳐 seen.json push가 충돌하는 것을 방지
concurrency:
  group: notice-watch
  cancel-in-progress: false

permissions:
  contents: write   # seen.json 커밋
  issues: write     # 신규 공지 이슈 생성

jobs:
  check:
    runs-on: ubuntu-latest
    # action은 mutable tag 대신 커밋 SHA로 고정한다(태그 오염 대비).
    # 버전 업데이트는 dependabot이 PR로 제안한다.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # push 토큰을 .git/config에 남기지 않는다. pip 의존성 등 job 안에서
          # 실행되는 서드파티 코드가 토큰을 읽지 못하게 하고, push 스텝에서만
          # env로 주입한다.
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: 의존성 설치
        # requirements.txt에 버전+sha256 고정. 오염된 신규 릴리스 유입 차단.
        run: pip install --require-hashes -r requirements.txt

      - name: 공지 확인
        id: check
        run: python check_notices.py

      - name: 신규 공지 이슈 생성
        if: steps.check.outputs.has_new == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          # 제목/본문은 ${{ }}로 인라인하지 않는다. 게시글 텍스트가 신뢰 불가
          # 입력이라, 파이썬이 쓴 파일을 fs로 읽어 스크립트 인젝션을 차단한다.
          # (is_error는 파이썬이 만드는 불리언이라 ${{ }}로 넘겨도 안전.)
          script: |
            const fs = require('fs');
            const title = fs.readFileSync('issue_title.txt', 'utf8').trim();
            const body = fs.readFileSync('issue_body.md', 'utf8');

            // 수집 실패 이슈는 제목이 고정이라 원인이 고쳐질 때까지 3일마다
            // 새 이슈가 쌓인다. 동일 제목의 open 이슈가 있으면 댓글로 합친다.
            const isError = ${{ steps.check.outputs.is_error == 'true' }};
            if (isError) {
              const { data: open } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'notice',
                state: 'open',
                per_page: 100,
              });
              const dup = open.find(i => i.title === title);
              if (dup) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: dup.number,
                  body,
                });
                return;
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['notice'],
            });

      - name: seen.json 커밋
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "chore: update seen.json"
          # 이슈는 이미 발행된 뒤라 push가 실패하면 seen.json이 유실되어 다음
          # 실행에서 중복 이슈가 나간다. 사람이 그 사이 main에 커밋하면(예:
          # keywords.txt 웹 편집) non-fast-forward가 되므로, rebase 후 재시도.
          # seen.json은 봇만 쓰므로 rebase 충돌은 사실상 없다.
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3; do
            if git pull --rebase "$REMOTE" "${{ github.ref_name }}" \
               && git push "$REMOTE" "HEAD:${{ github.ref_name }}"; then
              exit 0
            fi
            echo "push 실패 (시도 $i/3)"
            sleep 5
          done
          exit 1
